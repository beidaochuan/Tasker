name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      # ライセンス情報を JSON として生成（ビルド前に public/ へ）
      - name: Generate third-party licenses
        run: npm run licenses:generate

      # CHANGELOG から最新バージョンのセクションを抽出
      - name: Extract release notes
        run: awk '/^## \[/{if(p)exit; p=1} p' CHANGELOG.md > RELEASE_NOTES.md

      - name: Build app and API server
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Create release archive
        run: zip -r tasker-${{ github.ref_name }}.zip dist dist-server package.json package-lock.json README.md LICENSE

      # GitHub Release 作成（API サーバー込みの配布 zip を添付）
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: tasker-${{ github.ref_name }}.zip
